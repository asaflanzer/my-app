<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="Billiard 9 ball icon">
  <defs>
    <radialGradient id="ballShine9" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#fff176"/>
      <stop offset="35%" stop-color="#f4c430"/>
      <stop offset="100%" stop-color="#d4a017"/>
    </radialGradient>
  </defs>

  <!-- Ball -->
  <circle cx="128" cy="128" r="112" fill="url(#ballShine9)"/>

  <!-- Subtle highlight -->
  <ellipse cx="90" cy="82" rx="28" ry="18" fill="#ffffff" opacity="0.18" transform="rotate(-20 90 82)"/>

  <!-- White number circle -->
  <circle cx="128" cy="128" r="42" fill="#ffffff"/>

  <!-- Number 9 -->
  <text x="128" y="144"
        text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="64"
        font-weight="700"
        fill="#000000">9</text>
</svg>