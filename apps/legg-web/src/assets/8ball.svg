<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="Billiard 8 ball icon">
  <defs>
    <radialGradient id="ballShine" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#4a4a4a"/>
      <stop offset="35%" stop-color="#1f1f1f"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
  </defs>

  <!-- Ball -->
  <circle cx="128" cy="128" r="112" fill="url(#ballShine)"/>

  <!-- Subtle highlight -->
  <ellipse cx="90" cy="82" rx="28" ry="18" fill="#ffffff" opacity="0.16" transform="rotate(-20 90 82)"/>

  <!-- White number circle -->
  <circle cx="128" cy="128" r="42" fill="#ffffff"/>

  <!-- Number 8 -->
  <text x="128" y="144"
        text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="64"
        font-weight="700"
        fill="#000000">8</text>
</svg>